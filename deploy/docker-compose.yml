services:
  nginx:
    build:
      context: ../nginx
      args:
        NGINX_SITE: prod
    volumes:
      - ../nginx/html/dist:/usr/share/nginx/html:ro
      - ../nginx/ssl:/etc/ssl/cert:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - server

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    expose:
      - "3000"
    env_file:
      - ../.env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - /var/log/private-chef:/app/logs:rw

  agent:
    build:
      # 仓库根目录下的 private_chef_agent
      context: ../../private_chef_agent
      dockerfile: Dockerfile
    env_file:
      # 生产环境请在服务器上提供该文件（不要提交）
      - ../../private_chef_agent/.env
    expose:
      - "8001"
    volumes:
      - private_chef_agent_db_prod:/app/db

  mysql:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
    volumes:
      - private_chef_mysql_prod:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -p"$$MYSQL_ROOT_PASSWORD" >/dev/null',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7.0-alpine
    ports:
      - "6381:6379"
    command:
      ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - private_chef_redis_prod:/data

volumes:
  private_chef_mysql_prod:
  private_chef_redis_prod:
  private_chef_agent_db_prod:
