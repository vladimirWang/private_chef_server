# 测试分支：test.hetou.vip
# 请在此目录放置 chef.hetou.vip.pem、test.hetou.vip.key（或通配符证书同名）

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /nodejs_api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name chef.hetou.vip;

    # 测试栈宿主机 HTTPS 端口为 8443（见 docker-compose.test.yml: 8443:443）
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name chef.hetou.vip;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/ssl/cert/chef.hetou.vip.pem;
    ssl_certificate_key /etc/ssl/cert/chef.hetou.vip.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /nodejs_api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
