# 测试分支：test.hetou.vip
# 请在此目录放置 chef.hetou.vip.pem、test.hetou.vip.key（或通配符证书同名）

# chef.hetou.vip 必须与 default 共用本 server：若单独 server 仅写 return 301 →HTTPS，
# 则 http://域名:8080/api 不会反代而会被整站跳转。
server {
    listen 80 default_server;
    server_name chef.hetou.vip _;

    root /usr/share/nginx/html;
    index index.html;

    # 精确匹配 /py（无尾斜杠）；prefix location /py/ 不会匹配 GET /py
    location = /py {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # agent 的流式接口（SSE）需要关闭缓冲
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;

        # 去掉 /py 前缀，转发到 agent
        proxy_pass http://agent:8001/;
    }

    location /py/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;

        proxy_pass http://agent:8001/;
    }

    # 精确匹配 /api（无尾斜杠）；prefix location /api/ 不会匹配 GET /api
    location = /api {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /nodejs_api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name chef.hetou.vip;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/ssl/cert/chef.hetou.vip.pem;
    ssl_certificate_key /etc/ssl/cert/chef.hetou.vip.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /py {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;

        proxy_pass http://agent:8001/;
    }

    location /py/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;

        proxy_pass http://agent:8001/;
    }

    location = /api {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000/;
    }

    location /nodejs_api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://server:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
